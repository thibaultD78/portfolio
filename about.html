<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>À propos - Mon Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="matrix" id="matrix"></div>

  <div class="container hidden" id="mainContent">
    <nav class="sidebar">
      <div class="profile">
        <img src="187494332.png" alt="Photo de profil" />
        <p class="name">Thibault<br /><span class="lastname">DEVINEAU</span></p>
      </div>
      <button onclick="location.href='index.html'">🏠 Accueil</button>
      <button onclick="location.href='cv.html'">📄 CV</button>
      <button onclick="location.href='projets.html'">💻 Projets</button>
      <div class="icon-links">
        <a class="github-button" href="https://github.com/thibaultD78" target="_blank" title="GitHub">
          <img src="github.png" alt="GitHub" width="32" height="32" />
        </a>
        <a href="#" onclick="copyEmail()" title="Copier mon email">
          <img src="gmail.png" alt="Gmail" width="32" height="32" />
        </a>
      </div>
    </nav>
    <main class="main">
        <h1 id="typingTitle"></h1>
        <br />
        <p class="text-about" id="aboutText"></p>
    </main>
  </div>

  <script src="scripts/matrix.js"></script>
  <script>
        // Texte à typer pour le titre
    const titleText = "À propos de moi";

    // Texte fictif avec quelques mots glitchés
    const aboutContent = [
        "Je m'appelle ", { glitch: true, word: "Thibault Devineau"}, ",j'ai 19 ans et je suis actuellement en ", { glitch: true, word:"BTS SIO"}, "(Services Informatiques aux Organisations), spécialité ", { glitch: true, word:"SLAM"}, "(Solutions Logicielles et Applications Métiers). Cette formation me prépare au développement d'",{ glitch: true, word:"applications"}, ",à la gestion de ",{ glitch: true, word:"bases de données"}," et à la maintenance de solutions ", { glitch: true, word:"logicielles"}," adaptées aux besoins des entreprises.",{ lineBreak: true },
        "Titulaire d’un baccalauréat général avec mention ", { glitch: true, word: "assez bien"},", spécialités Mathématiques et Physique-Chimie, j’ai toujours été attiré par la logique, la résolution de problèmes et les outils techniques. ", { glitch: true, word: "Le développement"}, " est pour moi une passion que je cultive aussi bien dans le cadre ",{ glitch: true, word: "scolaire que personnel"},
        { lineBreak: true },
        " Au fil de mes ",{ glitch: true, word: "projets"}, " et de mes ",{ glitch: true, word: " expériences"},", j’ai travaillé avec plusieurs technologies comme ", { glitch: true, word: " Java, HTML/CSS, JavaScript, Angular, SQL"},", et même des solutions no-code comme ",{ glitch: true, word: "WordPress"},". Lors d’un stage chez ",{ glitch: true, word: "Swiss Life"},", j’ai participé au développement ", { glitch: true, word: " d’une API"},", ce qui m’a permis de découvrir les réalités du développement en entreprise et le ", { glitch: true, word: "travail en équipe."},
        { lineBreak: true },
        "Je suis quelqu’un de ", { glitch: true, word: " motivé, autonome"},", avec un fort esprit d’initiative. J’aime apprendre, expérimenter et ", { glitch: true, word: "partager mes connaissances"},". En dehors des cours, je consacre du temps à des ", { glitch: true, word: "projets personnels"}, " afin de progresser constamment et d’élargir mes ", { glitch: true, word: "compétences"}
    ];

    // Fonction typing pour le titre
    function typeTitle(text, elementId, delay = 75, callback = null) {
        const el = document.getElementById(elementId);
        let i = 0;
        el.textContent = "";
        el.classList.add("blinking-cursor");
        function typeChar() {
        if (i < text.length) {
            el.textContent += text.charAt(i);
            i++;
            setTimeout(typeChar, delay);
        } else {
            el.classList.remove("blinking-cursor");
            if (callback) callback();
        }
        }
        typeChar();
    }

    // Fonction pour afficher about avec glitches aléatoires
    function displayAboutText(content, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = ""; // vide

        content.forEach(item => {
            if (typeof item === "string") {
            container.appendChild(document.createTextNode(item));
            } else if (item.glitch) {
            const span = document.createElement("span");
            span.textContent = item.word;
            span.classList.add("glitch");
            span.setAttribute("data-text", item.word);
            container.appendChild(span);
            } else if (item.lineBreak) {
            container.appendChild(document.createElement("br"));
            container.appendChild(document.createElement("br"));
            } else if (item.word) {
            container.appendChild(document.createTextNode(item.word));
            }
        });
    }


    function randomGlitchEffect() {
  const glitchWords = document.querySelectorAll('.glitch');
  glitchWords.forEach(span => {
    // On choisit si on glitch ou pas (20% de chance par tick)
    if (Math.random() < 0.2) {
      span.classList.add('glitch-active');
      // Retire la classe après un court moment
      setTimeout(() => {
        span.classList.remove('glitch-active');
      }, 600); // glitch dure 600ms
    }
  });
}

// On lance cette fonction toutes les 1.5 secondes par exemple
setInterval(randomGlitchEffect, 1500);


    // Lance le tout après 2200ms (fin animation matrix)
    setTimeout(() => {
        typeTitle(titleText, "typingTitle", 75, () => {
        displayAboutText(aboutContent, "aboutText");
        });
    }, 2200);

    launchMatrixAnimation(() => {
      document.getElementById('mainContent').classList.remove('hidden');
    });

    function copyEmail() {
      const email = "thib.devineau@gmail.com";
      navigator.clipboard.writeText(email).then(() => {
        alert("Adresse email copiée !");
      }).catch(() => {
        alert("Erreur de copie.");
      });
    }
  </script>
</body>
</html>
